# Fas A requirements manifest — self-contained, completion-integrity-gate input.
#
# v3 — schema-realpath, dual status in all_of, FAS-A-012 regression.
# v2 — trust context, manifest binding, base_dir containment, strict receipts.
#
# Canonical source: Filip's approved Fas A requirement list (stable IDs, exact
# texts). The CIC (scripts/completion_integrity_check.py) computes status for
# every requirement; the manifest NEVER carries an `expected` field. The CIC
# derives the accepted outcome deterministically from the check type (krav 3):
#   git_ancestor          → exit_0 (commit IS ancestor)
#   git_not_ancestor       → exit_1 (commit is NOT ancestor)
#   file_sha256            → match  (file hash equals expected_sha256)
#   schema_valid           → valid  (YAML validates against schema)
#   test_receipt           → verified (receipt binds to requirement-id/check-id/
#                            branch/commit/result/timestamp/output_path/
#                            output_hash/receipt_hash AND is trust-bound)
#   owner_decision_receipt → authorized (owner decision, BLOCKED if no trust
#                            context or not authorized)
#   all_of                 → all sub-checks pass
#
# A manifest may NEVER declare `missing`, `unverified`, or `unauthorized` as
# accepted. There is no free `expected` field. Missing technical evidence = FAIL.
# Missing owner trust = BLOCKED. FAIL has priority over BLOCKED.
#
# The manifest is the single semantic authority (krav 1). No hardcoded
# REQUIREMENT_SEMANTICS table in Python. CIC reads requirement texts,
# source_hash, check type, and all_of structure from the manifest.
#
# Trust-gräns (krav 2): CLI/default mode has no trusted trust context and
# therefore NEVER sets closeout_permitted=true. The CIC has an injectable
# TrustContext protocol for future harness integration. Without verified trust
# context: fail-closed, closeout_permitted=false. The actual trust verifier
# and owner provisioning are NOT implemented in this candidate.
#
# Manifestbindning (krav 3): a verified trust context binds the exact manifest
# bytes/digest. Any change to ID, text, source_hash, check type, all_of
# structure, or check arguments changes the digest and gives manifest_tampered.
# Without trust context: fail-closed, no PASS.
#
# Strict test receipts (krav 4): exact strict schema with required fields:
# requirement_id, check_id, branch, commit, result (exactly "pass"), timestamp
# (valid ISO-8601 UTC, NO freshness window), output_path (required, must exist
# within base_dir), output_hash (sha256, recomputed from artefact), receipt_hash
# (sha256, recomputed from receipt bytes). Mismatch, missing field, or
# untrusted receipt binding → FAIL.
#
# Owner receipts (krav 5): without trust context, owner decision receipts
# ALWAYS give BLOCKED in production/CLI mode, never authorized from self-
# declared JSON. Test-only trust context can authorize for test purposes only.
#
# FAS-A-012 (krav 6): all_of of technical current-truth evidence (file_sha256)
# and separate owner decision (owner_decision_receipt). Missing technical =
# FAIL; missing owner trust = BLOCKED; FAIL has priority; both ID lists reported.
#
# Inga påhittade implementation paths (krav 7): neutral evidence-receipt-paths
# under control-plane/evidence/ in the manifest. No hardcoded paths to
# gateway/channel_route_contract.py, scripts/fleet_collector.py, the-terminal/
# modules/fleet-cockpit/view.js, etc. Receipts will later bind actual repo-,
# path-, and commit values. Dependency seal must in future evidence require
# actual enforcement code plus regression test; a YAML contract file alone is
# never enough. The Terminal is a separate repo and will later be represented
# by a commit-bound receipt, not a fabricated implementation path inside Hermes.
#
# Path containment (krav 8): manifest, schema, receipts, and output artefacts
# are bound to exact realpath(base_dir). Sibling worktrees, absolute paths
# outside base_dir, traversal, and symlink-escape are rejected. The future
# external trust context is a separate harness responsibility and is NOT
# simulated with a file in this project.
#
# Gate semantics (krav 10):
#   PASS    — manifest validates against schema; exactly IDs FAS-A-001..013
#             with no missing/extra/duplicate; trust context verifies manifest
#             digest; every requirement's computed status equals its
#             deterministic expected.
#   FAIL    — schema invalid; ID set not exactly {FAS-A-001..FAS-A-013};
#             manifest digest mismatch (manifest_tampered); any requirement's
#             computed status ≠ expected; source_hash drift; unknown check
#             type; path escape; shell metacharacters; receipt missing/binding
#             failure/untrusted_binding. Technical requirements with missing
#             implementation file/receipt = FAIL (NOT BLOCKED).
#   BLOCKED — a genuine owner-decision requirement (FAS-A-011, and the
#             owner_decision_receipt sub-check of FAS-A-012) without a verified
#             trust context. When BOTH FAIL and BLOCKED are present, gate=FAIL;
#             both failing_ids and blocked_ids are listed.
#
# Technical requirements (FAS-A-004..010, FAS-A-013) MUST be measured with
# actual file / schema / Git-ancestry / test-receipt evidence — they may NEVER
# pass via owner_decision_receipt. A missing technical implementation is FAIL.
# Only genuine Filip-owned choices (FAS-A-011, and the owner sub-check of
# FAS-A-012) may be BLOCKED via owner_decision_receipt.

