# Fas A requirements manifest — self-contained, completion-integrity-gate input.
#
# v1.1 — strict typed checks, deterministic expected, external manifest hash.
#
# Canonical source: Filip's approved Fas A requirement list (stable IDs, exact
# texts). The CIC (scripts/completion_integrity_check.py) computes status for
# every requirement; the manifest NEVER carries an `expected` field. The CIC
# derives the accepted outcome deterministically from the check type (krav 3):
#   git_ancestor          → exit_0 (commit IS ancestor)
#   git_not_ancestor       → exit_1 (commit is NOT ancestor)
#   file_sha256            → match  (file hash equals expected_sha256)
#   schema_valid           → valid  (YAML validates against schema)
#   test_receipt           → verified (receipt binds to branch/commit/check_id)
#   owner_decision_receipt → authorized (Filip-owned choice, BLOCKED if missing
#                            trust anchor / placeholder owner_id)
#   all_of                 → all sub-checks pass
#
# A manifest may NEVER declare `missing`, `unverified`, or `unauthorized` as
# accepted. There is no free `expected` field. Missing technical evidence =
# FAIL. Missing owner trust anchor = BLOCKED. FAIL has priority over BLOCKED.
#
# Reference hashes for provenance only (not referenced as paths in runnable code):
#   handoff sha256:       15fc2243425db99b924463d2aeff08653f59f7dab8d8a23afffe7c369df46ea1
#   audit sha256:         a5c1a81bd82d65daacaa9bfac01a037e29b7fa55d95ac29458292a558ad42ef6
#   cockpit-spec sha256:  8ca56832efd0aa9ee5444ca304b8cbaee999392cc8c589989e61b34535414da8
#
# Gate semantics (krav 7, 9, 10):
#   PASS    — manifest validates against schema; exactly IDs FAS-A-001..013
#             with no missing/extra/duplicate; manifest hash matches the
#             externally-supplied --expected-manifest-hash; every requirement's
#             computed status equals its deterministic expected.
#   FAIL    — schema invalid; ID set not exactly {FAS-A-001..FAS-A-013};
#             manifest hash mismatch (manifest_tampered); --expected-manifest-hash
#             missing on closeout; any requirement's computed status ≠ expected;
#             source_hash drift; unknown check type; path escape; shell
#             metacharacters; receipt missing/binding failure. Technical
#             requirements with missing implementation file/receipt = FAIL
#             (NOT BLOCKED).
#   BLOCKED — a genuine Filip-owned requirement (FAS-A-011 canonical required
#             skills; FAS-A-012 fleet owner_decision_id) uses
#             owner_decision_receipt with a placeholder owner_id or a receipt
#             without an external trust anchor. When BOTH FAIL and BLOCKED are
#             present, gate=FAIL; both failing_ids and blocked_ids are listed.
#
# Technical requirements (FAS-A-004..010, FAS-A-013) MUST be measured with
# actual file / schema / Git-ancestry / test-receipt evidence — they may NEVER
# pass via owner_decision_receipt. A missing technical implementation is FAIL.
# Only genuine Filip-owned choices (FAS-A-011, FAS-A-012) may be BLOCKED via
# owner_decision_receipt.

